    <style>

        .nav-links {

        .nav-links a:hover {

        }

        .nav-links a.active {
            color: #c8a84e;
            background-color: rgba(200, 168, 78, 0.15);
            font-weight: 600;
        }

        .nav-links a.nav-cta {

            background-color: #c8a84e;

        .nav-links a.nav-cta:hover {
            background-color: #e6c76e;
        }

        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: #c8a84e;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
        }

        header {

        }

        .header-content h1 {

        .header-content p {
            font-size: 1.1em;

        }

            padding: 20px;
        }

        .search-section {

            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid var(--border);

        .search-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1em;
            background-color: var(--primary);
            border: 2px solid var(--accent);
            border-radius: 6px;
            color: var(--text);
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .search-input:focus {

            box-shadow: 0 0 8px rgba(200, 168, 78, 0.3);

        }

            background: var(--accent);
            border-radius: 3px;
        }

            border-color: var(--accent);
            font-weight: bold;
        }

            background: var(--hover);
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

            transition: all 0.2s;

            gap: 12px;

            transition: all 0.3s;

            font-weight: bold;
            color: var(--accent);

            color: #b0c4de;
            font-style: italic;
        }

            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;

            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            white-space: nowrap;

            color: #4ade80;
            border: 1px solid #4ade80;

        .badge-stats {

            color: #64c8ff;
            border: 1px solid #64c8ff;
        }

        .badge-iso {
            background-color: rgba(255, 165, 0, 0.2);
            color: #ffa500;
            border: 1px solid #ffa500;
        }

        .badge-kaizen {
            background-color: rgba(220, 20, 60, 0.2);
            color: #dc143c;
            border: 1px solid #dc143c;
        }

        .badge-inspection {
            background-color: rgba(138, 43, 226, 0.2);
            color: #8a2be2;
            border: 1px solid #8a2be2;
        }

        .badge-management {
            background-color: rgba(30, 144, 255, 0.2);
            color: #1e90ff;
            border: 1px solid #1e90ff;
        }

        .expand-icon {
            font-size: 1.5em;
            color: var(--accent);
            transition: transform 0.3s;
            min-width: 30px;
            text-align: center;
        }

        .term-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .term-definition {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.4s ease-out;
            background-color: var(--primary);
            border-top: 1px solid var(--border);
        }

        .term-card.expanded .term-definition {
            max-height: 500px;
            padding: 16px;
        }

        .definition-text {
            margin-bottom: 12px;
            line-height: 1.7;
            color: #d0d8e0;
        }

        .related-terms {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .related-label {
            font-size: 0.9em;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 8px;
        }

        .related-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-link {
            padding: 6px 12px;
            background-color: var(--hover);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .related-link:hover {
            background-color: var(--accent);
            color: var(--primary);
        }

        /* ===== アクションバー ===== */
        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--primary);
        }

        .btn-primary:hover {
            background-color: #e8c96f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(200, 168, 78, 0.3);
        }

        .btn-secondary {
            background-color: var(--hover);
            color: var(--text);
            border: 1px solid var(--accent);
        }

        .btn-secondary:hover {
            background-color: var(--accent);
            color: var(--primary);
        }

        /* ===== メッセージ ===== */
        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #b0c4de;
            font-size: 1.1em;
        }

        .no-results svg {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* ===== フッター ===== */
        footer {
            background-color: var(--primary);
            border-top: 1px solid var(--border);
            padding: 20px;
            text-align: center;
            color: #707080;
            margin-top: 40px;
            font-size: 0.9em;
        }

        /* ===== レスポンシブ対応 ===== */
        @media (max-width: 1100px) {
            .navbar {
                padding: 0 16px;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                background-color: #060d1a;
                border-bottom: 1px solid #1a2a4a;
                flex-direction: column;
                padding: 12px 16px;
                gap: 4px;
            }

            .nav-links.open {
                display: flex;
            }

            .nav-toggle {
                display: block;
            }

            .header-content h1 {
                font-size: 1.8em;
            }

            .header-content p {
                font-size: 0.95em;
            }

            .container {
                padding: 12px;
            }

            .term-name-ja {
                font-size: 1em;
            }

            .term-header {
                padding: 12px;
            }

            .action-bar {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                padding: 12px 16px;
            }
        }

        /* ===== ハイライト ===== */
        .highlight {
            animation: highlight-pulse 0.6s ease-out;
        }

        @keyframes highlight-pulse {
            0% {
                background-color: rgba(200, 168, 78, 0.3);
                border-color: var(--accent);
            }
            100% {
                background-color: var(--hover);
                border-color: var(--border);
            }
        }

        /* ===== ローディング ===== */
        @keyframes shimmer {
            0% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.6;
            }
        }

        // ===== グローバル変数 =====
        let currentCategory = 'all';
        let searchTerm = '';
        let expandedTermId = null;
        let debounceTimer;

        // ===== 初期化 =====
        function init() {
            renderIndexButtons();
            renderTerms();
            setupEventListeners();
        }

        // ===== イベントリスナー設定 =====
        function setupEventListeners() {
            // 検索入力
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchTerm = e.target.value.toLowerCase();
                    renderTerms();
                }, 200);
            });

            // カテゴリタブ
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    renderTerms();
                });
            });

            // ランダム用語ボタン
            document.getElementById('randomTermBtn').addEventListener('click', showRandomTerm);
        }

        // ===== インデックスボタン生成 =====
        function renderIndexButtons() {
            const indexContainer = document.getElementById('indexButtons');
            const indices = ['あ', 'か', 'さ', 'た', 'な', 'は', 'ま', 'や', 'ら', 'わ', 'A-Z'];

            indices.forEach(idx => {
                const btn = document.createElement('button');
                btn.className = 'index-btn';
                btn.textContent = idx;
                btn.addEventListener('click', () => jumpToIndex(idx));
                indexContainer.appendChild(btn);
            });
        }

        // ===== インデックスジャンプ =====
        function jumpToIndex(index) {
            const filtered = getFilteredTerms();
            let targetTerm = null;

            if (index === 'A-Z') {
                targetTerm = filtered.find(t => /^[A-Z0-9]/.test(t.en.charAt(0)));
            } else {
                targetTerm = filtered.find(t => {
                    const first = t.ja.charAt(0);
                    return first === index;
                });
            }

            if (targetTerm) {
                const element = document.getElementById(`term-${targetTerm.id}`);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    highlightCard(element);
                }
            }
        }

        // ===== フィルタリング =====
        function getFilteredTerms() {
            return terms.filter(term => {
                const matchCategory = currentCategory === 'all' || term.category === currentCategory;
                const matchSearch = searchTerm === '' ||
                    term.ja.toLowerCase().includes(searchTerm) ||
                    term.en.toLowerCase().includes(searchTerm);
                return matchCategory && matchSearch;
            }).sort((a, b) => {
                // 日本語名でソート
                return a.ja.localeCompare(b.ja, 'ja');
            });
        }

        // ===== 用語リスト描画 =====
        function renderTerms() {
            const container = document.getElementById('termsContainer');
            const noResults = document.getElementById('noResults');
            const filtered = getFilteredTerms();

            container.innerHTML = '';

            if (filtered.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';

            filtered.forEach(term => {
                const card = createTermCard(term);
                container.appendChild(card);
            });
        }

        // ===== 用語カード作成 =====
        function createTermCard(term) {
            const card = document.createElement('div');
            card.className = 'term-card';
            card.id = `term-${term.id}`;

            const categoryLabel = getCategoryLabel(term.category);
            const badgeClass = getBadgeClass(term.category);
            const relatedTermsHtml = term.related
                .map(relatedId => {
                    const relatedTerm = terms.find(t => t.id === relatedId);
                    return `<button class="related-link" onclick="jumpToTerm(${relatedId})">${relatedTerm.ja}</button>`;
                })
                .join('');

            card.innerHTML = `
                <div class="term-header" onclick="toggleExpand(this)">
                    <div class="term-title-section">
                        <div class="term-name-ja">${term.ja}</div>
                        <div class="term-name-en">${term.en}</div>
                        <div class="term-badges">
                            <span class="badge ${badgeClass}">${categoryLabel}</span>
                        </div>
                    </div>
                    <div class="expand-icon">▼</div>
                </div>
                <div class="term-definition">
                    <div class="definition-text">${term.definition}</div>
                    <div class="related-terms">
                        <div class="related-label">関連用語</div>
                        <div class="related-links">${relatedTermsHtml}</div>
                    </div>
                </div>
            `;

            return card;
        }

        // ===== カテゴリラベル =====
        function getCategoryLabel(category) {
            const labels = {
                'qc': 'QC基礎',
                'stats': '統計',
                'iso': 'ISO',
                'kaizen': '改善手法',
                'inspection': '検査',
                'management': 'マネジメント'
            };
            return labels[category] || category;
        }

        // ===== バッジクラス =====
        function getBadgeClass(category) {
            const classes = {
                'qc': 'badge-qc',
                'stats': 'badge-stats',
                'iso': 'badge-iso',
                'kaizen': 'badge-kaizen',
                'inspection': 'badge-inspection',
                'management': 'badge-management'
            };
            return classes[category] || '';
        }

        // ===== 展開トグル =====
        function toggleExpand(header) {
            const card = header.closest('.term-card');
            const isExpanded = card.classList.contains('expanded');

            // 他のカードを閉じる
            document.querySelectorAll('.term-card.expanded').forEach(c => {
                if (c !== card) {
                    c.classList.remove('expanded');
                }
            });

            card.classList.toggle('expanded');
        }

        // ===== 用語へジャンプ =====
        function jumpToTerm(termId) {
            const element = document.getElementById(`term-${termId}`);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
                highlightCard(element);
                element.classList.add('expanded');
            }
        }

        // ===== ハイライト =====
        function highlightCard(element) {
            element.classList.add('highlight');
            setTimeout(() => {
                element.classList.remove('highlight');
            }, 600);
        }

        // ===== ランダム用語 =====
        function showRandomTerm() {
            const randomTerm = terms[Math.floor(Math.random() * terms.length)];

            // 全カテゴリを表示
            currentCategory = 'all';
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-category="all"]').classList.add('active');

            // 検索をクリア
            searchTerm = '';
            document.getElementById('searchInput').value = '';

            // 用語をレンダリング
            renderTerms();

            // ジャンプしてハイライト
            jumpToTerm(randomTerm.id);
        }

        // ===== 初期化実行 =====
        document.addEventListener('DOMContentLoaded', init);
    </script>



</html>
